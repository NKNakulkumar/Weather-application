<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Application</title>
    
</head>
<style>
    body {
    font-family:Cambria;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #e0f7fa;
}

.container {
    text-align: center;
    background: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.weather-info {
    background: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

input[type="text"] {
    padding: 10px;
    margin-right: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    width: 200px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    background-color: #00796b;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #004d40;
}

#weather-result {
    margin-top: 20px;
}

.weather-img {
    width: 300px;
    height: 180px;
    object-fit: cover;
}

</style>
<body>
    <div class="container">
        <h1>Weather Application</h1>
        <div class="weather-info">
            <input type="text" id="city" placeholder="Enter city name">
            <button id="get-weather">Get Weather</button>
            <div id="weather-result">
                <!-- Weather data and image will be displayed here -->
            </div>
        </div>
    </div>
    <script >document.getElementById('get-weather').addEventListener('click', getWeather);

        async function getWeather() {
            const apiKey = '95bc597a8038129d8b2d0281d746eb6c'; // Replace with your OpenWeatherMap API key
            const city = document.getElementById('city').value;
            const weatherResult = document.getElementById('weather-result');
            
            if (city === '') {
                weatherResult.innerHTML = '<p>Please enter a city name.</p>';
                return;
            }
        
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`);
                const data = await response.json();
                
                if (data.cod === '404') {
                    weatherResult.innerHTML = '<p>City not found. Please try again.</p>';
                } else {
                    const weatherCondition = data.weather[0].main.toLowerCase();
                    const weatherImage = getWeatherImage(weatherCondition);
                    
                    const weatherHTML = `
                        <h2>${data.name}</h2>
                        <img src="${weatherImage}" alt="${weatherCondition}" class="weather-img">
                        <p>Temperature: ${data.main.temp} °C</p>
                        <p>Weather: ${data.weather[0].description}</p>
                        <p>Humidity: ${data.main.humidity}%</p>
                        <p>Wind Speed: ${data.wind.speed} m/s</p>
                    `;
                    weatherResult.innerHTML = weatherHTML;
                }
            } catch (error) {
                weatherResult.innerHTML = `<p>An error occurred: ${error.message}</p>`;
            }
        }
        
        function getWeatherImage(condition) {
            switch (condition) {
                case 'clear':
                    return 'clear.jpg'; // Replace with actual image URLs
                case 'clouds':
                    return 'clouds.jpg';
                case 'rain':
                    return 'Rain.jpg';
                case 'snow':
                    return 'snow.jpg';
                case 'storm':
                    return 'storm.jpg';
                case 'haze':
                    return 'haze.jpg';
                    case 'mist':
                    return 'mist.avif';
                default:
                    return 'https://example.com/default.png'; // Default image
            }
        }
        </script>
</body>
</html>
